spring:
  application:
    name: ecommerce-app

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000

  jpa:
    hibernate:
      # Use 'validate' in dev to ensure Flyway migrations match your entities
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    # Ensures Flyway runs before Hibernate validates the schema
    baseline-on-migrate: true

phonepe:
  client:
    id: M238XASGN4NY7_2511160249
    secret: NDBiYmY0OGMtOWRiYy00MzBjLTgxMzYtYTFlZjMyYzAzMTcx

server:
  port: 8080

logging:
  level:
    root: INFO
    # Helpful for debugging database issues
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE